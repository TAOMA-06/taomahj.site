<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pixel Art Converter — transform images into pixel art">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
  <title>Pixel Art Converter — taomahj</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🎨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Spotlight overlay -->
  <div class="spotlight"></div>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="../index.html#hero" class="nav-logo">taomahj</a>
      <div class="nav-links">
        <a href="../index.html#projects" data-i18n="nav.projects">Projects</a>
        <a href="../index.html#knowledge" data-i18n="nav.knowledge">Knowledge</a>
        <a href="../index.html#about" data-i18n="nav.about">About</a>
        <a href="../index.html#contact" data-i18n="nav.contact">Contact</a>
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">
          <span class="lang-zh">中</span>
          <span class="lang-divider">/</span>
          <span class="lang-en">EN</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pixel-main">
    <div class="pixel-container">
      <h1 class="pixel-title" data-i18n="title">🎨 Pixel Art Converter</h1>
      <p class="pixel-desc" data-i18n="desc">Upload an image and convert it to pixel art — no watermark, fully client-side.</p>

      <!-- Upload Area -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="upload-content">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="upload-text" data-i18n="upload.drag">Drag & drop an image here</p>
          <p class="upload-hint" data-i18n="upload.or">or click to browse</p>
        </div>
      </div>

      <!-- Controls -->
      <div class="pixel-controls" id="controls" style="display:none;">
        <div class="control-group">
          <label data-i18n="controls.pixelSize">Pixel Size</label>
          <input type="range" id="pixelSize" min="4" max="64" value="16" step="2">
          <span class="control-value" id="pixelSizeVal">16px</span>
        </div>
        <div class="control-group">
          <label data-i18n="controls.palette">Palette</label>
          <select id="palette">
            <option value="none" data-i18n="palette.none">Full Color</option>
            <option value="nes" data-i18n="palette.nes">NES (54 colors)</option>
            <option value="gameboy" data-i18n="palette.gameboy">Game Boy (4 colors)</option>
            <option value="pico8" data-i18n="palette.pico8">PICO-8 (16 colors)</option>
            <option value="c64" data-i18n="palette.c64">C64 (16 colors)</option>
            <option value="grayscale" data-i18n="palette.grayscale">Grayscale</option>
          </select>
        </div>
        <div class="control-group">
          <label data-i18n="controls.dither">Dithering</label>
          <select id="dither">
            <option value="none" data-i18n="dither.none">None</option>
            <option value="bayer" data-i18n="dither.bayer">Bayer Ordered</option>
            <option value="floyd" data-i18n="dither.floyd">Floyd-Steinberg</option>
          </select>
        </div>
        <div class="control-group">
          <label data-i18n="controls.contrast">Contrast</label>
          <input type="range" id="contrast" min="0.5" max="2" value="1" step="0.1">
          <span class="control-value" id="contrastVal">1.0</span>
        </div>
        <div class="control-group">
          <label data-i18n="controls.brightness">Brightness</label>
          <input type="range" id="brightness" min="0.5" max="1.5" value="1" step="0.1">
          <span class="control-value" id="brightnessVal">1.0</span>
        </div>
        <div class="control-actions">
          <button class="btn btn-primary" id="downloadBtn" data-i18n="controls.download">Download PNG</button>
          <button class="btn btn-outline" id="resetBtn" data-i18n="controls.reset">Reset</button>
        </div>
      </div>

      <!-- Preview Area -->
      <div class="pixel-preview" id="previewArea" style="display:none;">
        <div class="preview-box">
          <h3 data-i18n="preview.original">Original</h3>
          <canvas id="originalCanvas"></canvas>
        </div>
        <div class="preview-box">
          <h3 data-i18n="preview.pixel">Pixel Art</h3>
          <canvas id="pixelCanvas"></canvas>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 taomahj — <span data-i18n="footer">Built with curiosity</span></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
