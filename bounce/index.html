<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Bounce Ball — Physics rebound game">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';">
  <title>Bounce Ball · Physics Game</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🏐</text></svg>">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      background: #050508;
      color: #f5f5f7;
      overflow: hidden;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Layout ===== */
    .game-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ===== HUD ===== */
    .hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      z-index: 10;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(5,5,8,0.9) 0%, transparent 100%);
    }
    .hud-left, .hud-right { display: flex; align-items: center; gap: 20px; }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #a1a1aa;
    }
    .hud-item .value {
      color: #f5f5f7;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
    }
    .hud-item .value.accent { color: #3b82f6; }
    .hud-item .value.danger { color: #ef4444; }
    .hud-item .value.gold { color: #fbbf24; }
    .ball-indicator {
      display: flex;
      gap: 4px;
    }
    .ball-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 6px rgba(59,130,246,0.5);
      transition: all 0.3s;
    }
    .ball-dot.used {
      background: #333;
      box-shadow: none;
    }

    /* ===== Canvas Container ===== */
    .canvas-container {
      position: relative;
      width: min(90vw, 800px);
      height: min(80vh, 600px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0a0a14;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(59,130,246,0.08), inset 0 0 40px rgba(0,0,0,0.5);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    canvas.aiming { cursor: none; }

    /* ===== Overlays ===== */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(5,5,8,0.92);
      backdrop-filter: blur(12px);
      transition: opacity 0.4s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #3b82f6 0%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .overlay-subtitle {
      color: #a1a1aa;
      font-size: 1rem;
      margin-bottom: 32px;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .level-card {
      width: 140px;
      padding: 20px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(59,130,246,0.04);
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    .level-card:hover {
      border-color: rgba(59,130,246,0.4);
      background: rgba(59,130,246,0.08);
      transform: translateY(-2px);
    }
    .level-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .level-card .level-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 4px;
    }
    .level-card .level-name {
      font-size: 0.85rem;
      color: #f5f5f7;
      margin-bottom: 8px;
    }
    .level-card .level-desc {
      font-size: 0.75rem;
      color: #6b6b7b;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin-top: 8px;
    }
    .star {
      font-size: 1rem;
      color: #333;
      transition: color 0.3s;
    }
    .star.earned { color: #fbbf24; text-shadow: 0 0 8px rgba(251,191,36,0.4); }

    .btn {
      padding: 12px 36px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.25s;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.45);
    }
    .btn-outline {
      background: transparent;
      color: #f5f5f7;
      border: 1px solid rgba(255,255,255,0.12);
      margin-left: 12px;
    }
    .btn-outline:hover {
      border-color: rgba(59,130,246,0.5);
      background: rgba(59,130,246,0.08);
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
      min-width: 280px;
    }
    .stat-item {
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 14px 18px;
      text-align: center;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #6b6b7b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f5f5f7;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-value.accent { color: #3b82f6; }
    .stat-value.gold { color: #fbbf24; }

    .result-stars {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .result-stars .star {
      font-size: 2.5rem;
      color: #333;
      transition: all 0.4s ease-out;
      transform: scale(0);
    }
    .result-stars .star.show {
      transform: scale(1);
    }
    .result-stars .star.earned {
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251,191,36,0.5);
    }

    /* ===== Back link ===== */
    .back-link {
      position: absolute;
      top: 16px;
      left: 24px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6b6b7b;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
      pointer-events: auto;
    }
    .back-link:hover { color: #3b82f6; }

    /* ===== Tutorial hint ===== */
    .tutorial-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #6b6b7b;
      font-size: 0.8rem;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .tutorial-hint.show { opacity: 1; }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .overlay-title { font-size: 1.8rem; }
      .level-grid { grid-template-columns: 1fr; }
      .level-card { width: 200px; }
      .hud { padding: 12px 16px; font-size: 0.8rem; }
      .hud-item .value { font-size: 0.95rem; }
      .canvas-container { width: 95vw; height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <a href="../index.html" class="back-link">← Back</a>

    <!-- HUD -->
    <div class="hud" id="hud">
      <div class="hud-left">
        <div class="hud-item">
          <span>Level</span>
          <span class="value accent" id="hudLevel">1</span>
        </div>
        <div class="hud-item">
          <span>Balls</span>
          <div class="ball-indicator" id="hudBalls"></div>
        </div>
      </div>
      <div class="hud-right">
        <div class="hud-item">
          <span>Score</span>
          <span class="value gold" id="hudScore">0</span>
        </div>
        <div class="hud-item" id="hudTimeWrap" style="display:none;">
          <span>Time</span>
          <span class="value danger" id="hudTime">60</span>
        </div>
        <div class="hud-item">
          <span>Targets</span>
          <span class="value" id="hudTargets">0/3</span>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="tutorial-hint" id="tutorialHint">Drag to aim, release to shoot</div>

    <!-- Menu Overlay -->
    <div class="overlay" id="menuOverlay">
      <div class="overlay-title">🏐 Bounce Ball</div>
      <div class="overlay-subtitle">Aim carefully, use the walls,<br>hit all targets with limited balls.</div>
      <div class="level-grid" id="levelGrid"></div>
    </div>

    <!-- Level Complete Overlay -->
    <div class="overlay hidden" id="levelOverlay">
      <div class="overlay-title" id="levelTitle">Level Complete!</div>
      <div class="result-stars" id="resultStars"></div>
      <div class="result-stats">
        <div class="stat-item">
          <div class="stat-label">Score</div>
          <div class="stat-value gold" id="resultScore">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Balls Left</div>
          <div class="stat-value accent" id="resultBalls">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Bounces</div>
          <div class="stat-value" id="resultBounces">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="resultTime">0s</div>
        </div>
      </div>
      <div>
        <button class="btn btn-primary" id="btnNext">Next Level</button>
        <button class="btn btn-outline" id="btnRetry">Retry</button>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
      <div class="overlay-title" style="color:#ef4444;">Game Over</div>
      <div class="overlay-subtitle" id="gameOverReason">Out of balls!</div>
      <div class="result-stats" style="grid-template-columns:1fr 1fr;min-width:240px;">
        <div class="stat-item">
          <div class="stat-label">Final Score</div>
          <div class="stat-value gold" id="finalScore">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Levels</div>
          <div class="stat-value accent" id="finalLevels">0</div>
        </div>
      </div>
      <div>
        <button class="btn btn-primary" id="btnRestart">Play Again</button>
        <button class="btn btn-outline" id="btnMenu">Menu</button>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       BOUNCE BALL — Physics Rebound Game
       Pure Canvas 2D, no external dependencies
       ============================================================ */

    // ===== Constants =====
    const CANVAS_W = 800;
    const CANVAS_H = 600;
    const BALL_RADIUS = 10;
    const BALL_MAX_SPEED = 18;
    const STOP_THRESHOLD = 0.35;
    const DAMPING = 0.985;
    const BOUNCE_DAMPING = 0.98;
    const DRAG_MAX_DIST = 180;
    const DRAG_POWER = 0.12;
    const TRAIL_LENGTH = 10;
    const PARTICLE_MAX = 60;
    const FLOATER_MAX = 12;

    // ===== Level Data =====
    const LEVELS = [
      {
        id: 1,
        name: 'Open Space',
        desc: '3 targets, 5 balls',
        balls: 5,
        timeLimit: 0,
        targets: [
          { x: 600, y: 150, r: 18, move: null },
          { x: 650, y: 400, r: 18, move: null },
          { x: 400, y: 300, r: 18, move: null },
        ],
        obstacles: [],
        spawn: { x: 120, y: 300 }
      },
      {
        id: 2,
        name: 'The Maze',
        desc: '4 targets, 5 balls',
        balls: 5,
        timeLimit: 0,
        targets: [
          { x: 700, y: 120, r: 16, move: null },
          { x: 700, y: 480, r: 16, move: null },
          { x: 450, y: 200, r: 16, move: null },
          { x: 450, y: 400, r: 16, move: null },
        ],
        obstacles: [
          { x: 280, y: 0, w: 20, h: 200 },
          { x: 280, y: 400, w: 20, h: 200 },
          { x: 500, y: 280, w: 20, h: 120 },
          { x: 350, y: 250, w: 100, h: 16 },
          { x: 350, y: 334, w: 100, h: 16 },
        ],
        spawn: { x: 100, y: 300 }
      },
      {
        id: 3,
        name: 'Moving Targets',
        desc: '5 targets, 6 balls, 60s',
        balls: 6,
        timeLimit: 60,
        targets: [
          { x: 500, y: 150, r: 15, move: { axis: 'y', min: 80, max: 250, speed: 1.2 } },
          { x: 650, y: 300, r: 15, move: { axis: 'x', min: 520, max: 720, speed: 1.5 } },
          { x: 400, y: 450, r: 15, move: { axis: 'y', min: 350, max: 520, speed: 1.0 } },
          { x: 550, y: 200, r: 15, move: { axis: 'x', min: 400, max: 600, speed: 1.8 } },
          { x: 700, y: 400, r: 15, move: { axis: 'y', min: 300, max: 500, speed: 1.3 } },
        ],
        obstacles: [
          { x: 300, y: 150, w: 16, h: 120, rotate: { cx: 308, cy: 210, speed: 0.008 } },
          { x: 300, y: 350, w: 16, h: 120, rotate: { cx: 308, cy: 410, speed: -0.006 } },
          { x: 450, y: 100, w: 80, h: 14 },
          { x: 450, y: 486, w: 80, h: 14 },
        ],
        spawn: { x: 100, y: 300 }
      }
    ];

    // ===== Game State =====
    const State = {
      MENU: 0,
      AIMING: 1,
      FLYING: 2,
      ROUND_END: 3,
      LEVEL_END: 4,
      GAME_OVER: 5
    };

    let game = {
      state: State.MENU,
      levelIndex: 0,
      score: 0,
      ballsLeft: 0,
      ballsTotal: 0,
      targets: [],
      obstacles: [],
      spawn: { x: 0, y: 0 },
      ball: null,
      particles: [],
      floaters: [],
      trail: [],
      bounces: 0,
      hitsThisShot: 0,
      timeLeft: 0,
      levelStartTime: 0,
      timerInterval: null,
      unlockedLevels: 1,
      levelStars: [0, 0, 0],
      dragStart: null,
      dragCurrent: null,
      scale: 1,
      canvas: null,
      ctx: null,
      animId: null
    };

    // ===== DOM refs =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    game.canvas = canvas;
    game.ctx = ctx;

    // ===== Resize =====
    function resize() {
      const rect = container.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = CANVAS_W * dpr;
      canvas.height = CANVAS_H * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      game.scale = rect.width / CANVAS_W;
    }
    resize();
    window.addEventListener('resize', resize);

    // ===== Utility =====
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    // ===== Classes =====
    class Ball {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.r = BALL_RADIUS;
        this.active = false;
      }
      update() {
        if (!this.active) return;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= DAMPING;
        this.vy *= DAMPING;
        // Stop threshold
        if (Math.hypot(this.vx, this.vy) < STOP_THRESHOLD) {
          this.vx = 0; this.vy = 0;
          this.active = false;
          onBallStop();
        }
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.decay = Math.random() * 0.03 + 0.02;
        this.color = color;
        this.size = Math.random() * 3 + 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.08;
        this.life -= this.decay;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    class Floater {
      constructor(x, y, text, color) {
        this.x = x; this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1;
        this.vy = -1.5;
      }
      update() {
        this.y += this.vy;
        this.life -= 0.015;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.font = 'bold 16px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1;
      }
    }

    // ===== Collision =====
    function checkWallCollision(ball) {
      let bounced = false;
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING; bounced = true; }
      if (ball.x + ball.r > CANVAS_W) { ball.x = CANVAS_W - ball.r; ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING; bounced = true; }
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy) * BOUNCE_DAMPING; bounced = true; }
      if (ball.y + ball.r > CANVAS_H) { ball.y = CANVAS_H - ball.r; ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING; bounced = true; }
      return bounced;
    }

    function checkObstacleCollision(ball) {
      for (const obs of game.obstacles) {
        const rect = getObstacleRect(obs);
        // Find closest point on rect to circle center
        const cx = clamp(ball.x, rect.x, rect.x + rect.w);
        const cy = clamp(ball.y, rect.y, rect.y + rect.h);
        const dx = ball.x - cx;
        const dy = ball.y - cy;
        const d = Math.hypot(dx, dy);
        if (d < ball.r && d > 0) {
          // Normal vector
          const nx = dx / d;
          const ny = dy / d;
          // Push out
          ball.x = cx + nx * ball.r;
          ball.y = cy + ny * ball.r;
          // Reflect velocity
          const dot = ball.vx * nx + ball.vy * ny;
          ball.vx = (ball.vx - 2 * dot * nx) * BOUNCE_DAMPING;
          ball.vy = (ball.vy - 2 * dot * ny) * BOUNCE_DAMPING;
          return true;
        }
        // Also check if center is inside rect (rare but possible at high speed)
        if (d === 0) {
          // Push toward nearest edge
          const left = ball.x - rect.x;
          const right = rect.x + rect.w - ball.x;
          const top = ball.y - rect.y;
          const bottom = rect.y + rect.h - ball.y;
          const minDist = Math.min(left, right, top, bottom);
          if (minDist === left) { ball.x = rect.x - ball.r; ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING; }
          else if (minDist === right) { ball.x = rect.x + rect.w + ball.r; ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING; }
          else if (minDist === top) { ball.y = rect.y - ball.r; ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING; }
          else { ball.y = rect.y + rect.h + ball.r; ball.vy = Math.abs(ball.vy) * BOUNCE_DAMPING; }
          return true;
        }
      }
      return false;
    }

    function getObstacleRect(obs) {
      if (!obs.rotate) return obs;
      // For rotating obstacles, compute current rotation
      const angle = obs.rotate.baseAngle + (Date.now() - obs.rotate.startTime) * obs.rotate.speed;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      // Return AABB approximation for collision (simpler but effective)
      // For better accuracy we'd use OBB, but AABB with margin works for this game
      const hw = obs.w / 2, hh = obs.h / 2;
      const rx = Math.abs(cos * hw) + Math.abs(sin * hh);
      const ry = Math.abs(sin * hw) + Math.abs(cos * hh);
      return {
        x: obs.rotate.cx - rx,
        y: obs.rotate.cy - ry,
        w: rx * 2,
        h: ry * 2
      };
    }

    function checkTargetCollision(ball) {
      for (let i = game.targets.length - 1; i >= 0; i--) {
        const t = game.targets[i];
        if (dist(ball, t) < ball.r + t.r) {
          // Hit!
          spawnParticles(t.x, t.y, '#ef4444', 10);
          game.targets.splice(i, 1);
          game.hitsThisShot++;
          let points = 100;
          if (game.bounces >= 3) points += 50; // Long shot bonus
          if (game.hitsThisShot >= 2) points *= (2 * (game.hitsThisShot - 1)); // Chain bonus
          game.score += points;
          const label = game.bounces >= 3 ? '+' + points + ' 🔥' : '+' + points;
          addFloater(t.x, t.y - 20, label, '#fbbf24');
          updateHUD();
          if (game.targets.length === 0) {
            setTimeout(onLevelComplete, 400);
          }
          return true;
        }
      }
      return false;
    }

    // ===== Spawners =====
    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count && game.particles.length < PARTICLE_MAX; i++) {
        game.particles.push(new Particle(x, y, color));
      }
    }
    function addFloater(x, y, text, color) {
      if (game.floaters.length < FLOATER_MAX) {
        game.floaters.push(new Floater(x, y, text, color));
      }
    }

    // ===== Game Events =====
    function onBallStop() {
      game.state = State.ROUND_END;
      game.trail = [];
      if (game.targets.length > 0) {
        if (game.ballsLeft > 0) {
          setTimeout(() => {
            if (game.state === State.ROUND_END) {
              game.state = State.AIMING;
              game.ball = new Ball(game.spawn.x, game.spawn.y);
              game.bounces = 0;
              game.hitsThisShot = 0;
              canvas.classList.add('aiming');
            }
          }, 400);
        } else {
          setTimeout(() => onGameOver('Out of balls!'), 500);
        }
      }
    }

    function onLevelComplete() {
      game.state = State.LEVEL_END;
      clearInterval(game.timerInterval);
      const elapsed = Math.floor((Date.now() - game.levelStartTime) / 1000);
      // Calculate stars
      let stars = 1;
      const lvl = LEVELS[game.levelIndex];
      if (game.ballsLeft >= lvl.balls * 0.5) stars = 2;
      if (game.ballsLeft >= lvl.balls * 0.7 && game.bounces > 5) stars = 3;
      if (game.levelStars[game.levelIndex] < stars) {
        game.levelStars[game.levelIndex] = stars;
      }
      if (game.levelIndex + 1 >= game.unlockedLevels) {
        game.unlockedLevels = Math.min(game.levelIndex + 2, LEVELS.length);
      }
      showLevelComplete(stars, elapsed);
    }

    function onGameOver(reason) {
      game.state = State.GAME_OVER;
      clearInterval(game.timerInterval);
      showGameOver(reason);
    }

    // ===== Level Management =====
    function loadLevel(index) {
      game.levelIndex = index;
      const lvl = LEVELS[index];
      game.ballsTotal = lvl.balls;
      game.ballsLeft = lvl.balls;
      game.score = 0;
      game.bounces = 0;
      game.hitsThisShot = 0;
      game.spawn = { ...lvl.spawn };
      game.ball = new Ball(lvl.spawn.x, lvl.spawn.y);
      game.trail = [];
      game.particles = [];
      game.floaters = [];

      // Deep copy targets
      game.targets = lvl.targets.map(t => ({
        x: t.x, y: t.y, r: t.r,
        move: t.move ? { ...t.move, dir: 1, baseX: t.x, baseY: t.y } : null
      }));

      // Deep copy obstacles with rotation state
      game.obstacles = lvl.obstacles.map(o => {
        const obs = { ...o };
        if (o.rotate) {
          obs.rotate = { ...o.rotate, baseAngle: 0, startTime: Date.now() };
        }
        return obs;
      });

      game.timeLeft = lvl.timeLimit;
      game.levelStartTime = Date.now();

      if (lvl.timeLimit > 0) {
        game.timerInterval = setInterval(() => {
          game.timeLeft--;
          if (game.timeLeft <= 0) {
            onGameOver('Time\'s up!');
          }
          updateHUD();
        }, 1000);
      }

      game.state = State.AIMING;
      canvas.classList.add('aiming');
      updateHUD();
      document.getElementById('hudTimeWrap').style.display = lvl.timeLimit > 0 ? 'flex' : 'none';

      // Show tutorial hint briefly
      const hint = document.getElementById('tutorialHint');
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 4000);
    }

    // ===== HUD =====
    function updateHUD() {
      document.getElementById('hudLevel').textContent = game.levelIndex + 1;
      document.getElementById('hudScore').textContent = game.score;
      document.getElementById('hudTargets').textContent = `${LEVELS[game.levelIndex].targets.length - game.targets.length}/${LEVELS[game.levelIndex].targets.length}`;
      if (game.timeLeft > 0) document.getElementById('hudTime').textContent = game.timeLeft;

      const ballsContainer = document.getElementById('hudBalls');
      ballsContainer.innerHTML = '';
      for (let i = 0; i < game.ballsTotal; i++) {
        const dot = document.createElement('div');
        dot.className = 'ball-dot' + (i >= game.ballsLeft ? ' used' : '');
        ballsContainer.appendChild(dot);
      }
    }

    // ===== Overlays =====
    function buildMenu() {
      const grid = document.getElementById('levelGrid');
      if (!grid) return;
      grid.innerHTML = '';
      LEVELS.forEach((lvl, i) => {
        const card = document.createElement('div');
        card.className = 'level-card' + (i >= game.unlockedLevels ? ' locked' : '');
        const stars = game.levelStars[i] || 0;
        card.innerHTML = `
          <div class="level-num">${lvl.id}</div>
          <div class="level-name">${lvl.name}</div>
          <div class="level-desc">${lvl.desc}</div>
          <div class="stars">
            <span class="star ${stars >= 1 ? 'earned' : ''}">★</span>
            <span class="star ${stars >= 2 ? 'earned' : ''}">★</span>
            <span class="star ${stars >= 3 ? 'earned' : ''}">★</span>
          </div>
        `;
        if (i < game.unlockedLevels) {
          card.addEventListener('click', () => {
            document.getElementById('menuOverlay').classList.add('hidden');
            loadLevel(i);
          });
        }
        grid.appendChild(card);
      });
    }

    function showLevelComplete(stars, elapsed) {
      const overlay = document.getElementById('levelOverlay');
      overlay.classList.remove('hidden');
      document.getElementById('levelTitle').textContent = 'Level Complete!';
      document.getElementById('resultScore').textContent = game.score;
      document.getElementById('resultBalls').textContent = game.ballsLeft;
      document.getElementById('resultBounces').textContent = game.bounces;
      document.getElementById('resultTime').textContent = elapsed + 's';

      const starsContainer = document.getElementById('resultStars');
      starsContainer.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const star = document.createElement('span');
        star.className = 'star' + (i < stars ? ' earned' : '');
        star.textContent = '★';
        starsContainer.appendChild(star);
        setTimeout(() => star.classList.add('show'), 200 + i * 200);
      }

      const nextBtn = document.getElementById('btnNext');
      if (game.levelIndex >= LEVELS.length - 1) {
        nextBtn.textContent = 'All Levels Done!';
        nextBtn.disabled = true;
        nextBtn.style.opacity = '0.5';
      } else {
        nextBtn.textContent = 'Next Level';
        nextBtn.disabled = false;
        nextBtn.style.opacity = '1';
      }
    }

    function showGameOver(reason) {
      const overlay = document.getElementById('gameOverOverlay');
      overlay.classList.remove('hidden');
      document.getElementById('gameOverReason').textContent = reason;
      document.getElementById('finalScore').textContent = game.score;
      document.getElementById('finalLevels').textContent = game.levelIndex + 1;
    }

    // ===== Input =====
    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) / game.scale,
        y: (clientY - rect.top) / game.scale
      };
    }

    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('touchstart', onPointerDown, { passive: false });

    function onPointerDown(e) {
      if (e.touches) e.preventDefault();
      if (game.state !== State.AIMING) return;
      game.dragStart = getCanvasPos(e);
      game.dragCurrent = game.dragStart;
    }

    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, { passive: false });

    function onPointerMove(e) {
      if (!game.dragStart || game.state !== State.AIMING) return;
      if (e.touches) e.preventDefault();
      game.dragCurrent = getCanvasPos(e);
    }

    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchend', onPointerUp);

    function onPointerUp(e) {
      if (!game.dragStart || game.state !== State.AIMING) return;
      const dx = game.dragStart.x - game.dragCurrent.x;
      const dy = game.dragStart.y - game.dragCurrent.y;
      const d = Math.hypot(dx, dy);
      if (d > 10) {
        const power = Math.min(d, DRAG_MAX_DIST) * DRAG_POWER;
        const angle = Math.atan2(dy, dx);
        game.ball.vx = Math.cos(angle) * power;
        game.ball.vy = Math.sin(angle) * power;
        // Clamp max speed
        const speed = Math.hypot(game.ball.vx, game.ball.vy);
        if (speed > BALL_MAX_SPEED) {
          const scale = BALL_MAX_SPEED / speed;
          game.ball.vx *= scale;
          game.ball.vy *= scale;
        }
        game.ball.active = true;
        game.ballsLeft--;
        game.bounces = 0;
        game.hitsThisShot = 0;
        game.state = State.FLYING;
        canvas.classList.remove('aiming');
        updateHUD();
      }
      game.dragStart = null;
      game.dragCurrent = null;
    }

    // ===== Buttons =====
    document.getElementById('btnNext').addEventListener('click', () => {
      document.getElementById('levelOverlay').classList.add('hidden');
      if (game.levelIndex < LEVELS.length - 1) {
        loadLevel(game.levelIndex + 1);
      }
    });
    document.getElementById('btnRetry').addEventListener('click', () => {
      document.getElementById('levelOverlay').classList.add('hidden');
      loadLevel(game.levelIndex);
    });
    document.getElementById('btnRestart').addEventListener('click', () => {
      document.getElementById('gameOverOverlay').classList.add('hidden');
      game.unlockedLevels = 1;
      game.levelStars = [0, 0, 0];
      loadLevel(0);
    });
    document.getElementById('btnMenu').addEventListener('click', () => {
      document.getElementById('gameOverOverlay').classList.add('hidden');
      document.getElementById('levelOverlay').classList.add('hidden');
      game.state = State.MENU;
      buildMenu();
      document.getElementById('menuOverlay').classList.remove('hidden');
    });

    // ===== Rendering =====
    function drawBackground() {
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= CANVAS_W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
      }
      for (let y = 0; y <= CANVAS_H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
      }

      // Corner accents
      ctx.strokeStyle = 'rgba(59,130,246,0.15)';
      ctx.lineWidth = 2;
      const cornerLen = 30;
      // Top-left
      ctx.beginPath(); ctx.moveTo(0, cornerLen); ctx.lineTo(0, 0); ctx.lineTo(cornerLen, 0); ctx.stroke();
      // Top-right
      ctx.beginPath(); ctx.moveTo(CANVAS_W - cornerLen, 0); ctx.lineTo(CANVAS_W, 0); ctx.lineTo(CANVAS_W, cornerLen); ctx.stroke();
      // Bottom-left
      ctx.beginPath(); ctx.moveTo(0, CANVAS_H - cornerLen); ctx.lineTo(0, CANVAS_H); ctx.lineTo(cornerLen, CANVAS_H); ctx.stroke();
      // Bottom-right
      ctx.beginPath(); ctx.moveTo(CANVAS_W - cornerLen, CANVAS_H); ctx.lineTo(CANVAS_W, CANVAS_H); ctx.lineTo(CANVAS_W, CANVAS_H - cornerLen); ctx.stroke();
    }

    function drawObstacles() {
      for (const obs of game.obstacles) {
        ctx.save();
        if (obs.rotate) {
          const angle = obs.rotate.baseAngle + (Date.now() - obs.rotate.startTime) * obs.rotate.speed;
          ctx.translate(obs.rotate.cx, obs.rotate.cy);
          ctx.rotate(angle);
          ctx.fillStyle = 'rgba(6,182,212,0.25)';
          ctx.strokeStyle = 'rgba(6,182,212,0.6)';
          ctx.lineWidth = 2;
          ctx.shadowColor = 'rgba(6,182,212,0.4)';
          ctx.shadowBlur = 10;
          ctx.fillRect(-obs.w / 2, -obs.h / 2, obs.w, obs.h);
          ctx.strokeRect(-obs.w / 2, -obs.h / 2, obs.w, obs.h);
        } else {
          ctx.fillStyle = 'rgba(100,116,139,0.25)';
          ctx.strokeStyle = 'rgba(100,116,139,0.5)';
          ctx.lineWidth = 2;
          ctx.shadowColor = 'rgba(100,116,139,0.2)';
          ctx.shadowBlur = 6;
          ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
          ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        }
        ctx.restore();
      }
    }

    function drawTargets() {
      const time = Date.now() / 1000;
      for (const t of game.targets) {
        // Update moving targets
        if (t.move) {
          const mv = t.move;
          if (mv.axis === 'x') {
            t.x += mv.speed * mv.dir;
            if (t.x > mv.max || t.x < mv.min) mv.dir *= -1;
          } else {
            t.y += mv.speed * mv.dir;
            if (t.y > mv.max || t.y < mv.min) mv.dir *= -1;
          }
        }

        const pulse = Math.sin(time * 3 + t.x) * 0.15 + 1;
        const r = t.r * pulse;

        ctx.save();
        ctx.shadowColor = 'rgba(239,68,68,0.6)';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(t.x - r * 0.3, t.y - r * 0.3, r * 0.25, 0, Math.PI * 2);
        ctx.fill();

        // Ring
        ctx.strokeStyle = 'rgba(239,68,68,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r + 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawBall() {
      if (!game.ball) return;
      const b = game.ball;

      // Trail
      if (b.active && game.trail.length > 0) {
        for (let i = 0; i < game.trail.length; i++) {
          const t = game.trail[i];
          const alpha = (i / game.trail.length) * 0.4;
          const size = b.r * (i / game.trail.length);
          ctx.fillStyle = `rgba(34,211,238,${alpha})`;
          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Glow
      ctx.save();
      ctx.shadowColor = 'rgba(34,211,238,0.8)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 8;
      ctx.fillStyle = '#22d3ee';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawAimGuide() {
      if (!game.dragStart || !game.dragCurrent || game.state !== State.AIMING) return;
      const dx = game.dragStart.x - game.dragCurrent.x;
      const dy = game.dragStart.y - game.dragCurrent.y;
      const d = Math.hypot(dx, dy);
      if (d < 5) return;

      const power = Math.min(d, DRAG_MAX_DIST) / DRAG_MAX_DIST;
      const angle = Math.atan2(dy, dx);
      const guideLen = power * 200;

      // Color from green to red
      const r = Math.floor(lerp(34, 239, power));
      const g = Math.floor(lerp(211, 68, power));
      const color = `rgb(${r},${g},238)`;

      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.globalAlpha = 0.7;

      ctx.beginPath();
      ctx.moveTo(game.ball.x, game.ball.y);
      ctx.lineTo(
        game.ball.x + Math.cos(angle) * guideLen,
        game.ball.y + Math.sin(angle) * guideLen
      );
      ctx.stroke();

      // Arrow head
      const ax = game.ball.x + Math.cos(angle) * guideLen;
      const ay = game.ball.y + Math.sin(angle) * guideLen;
      const headLen = 10;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - headLen * Math.cos(angle - 0.5), ay - headLen * Math.sin(angle - 0.5));
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - headLen * Math.cos(angle + 0.5), ay - headLen * Math.sin(angle + 0.5));
      ctx.stroke();

      // Power indicator circle at drag point
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(game.dragCurrent.x, game.dragCurrent.y, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawSpawnPoint() {
      if (game.state !== State.AIMING && game.state !== State.ROUND_END) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(59,130,246,0.4)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(game.spawn.x, game.spawn.y, 16, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(59,130,246,0.15)';
      ctx.beginPath();
      ctx.arc(game.spawn.x, game.spawn.y, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of game.particles) p.draw(ctx);
    }
    function drawFloaters() {
      for (const f of game.floaters) f.draw(ctx);
    }

    // ===== Main Loop =====
    function update() {
      if (game.ball && game.ball.active) {
        game.ball.update();

        // Trail
        game.trail.push({ x: game.ball.x, y: game.ball.y });
        if (game.trail.length > TRAIL_LENGTH) game.trail.shift();

        // Collisions
        if (checkWallCollision(game.ball)) {
          game.bounces++;
          spawnParticles(game.ball.x, game.ball.y, '#22d3ee', 4);
        }
        if (checkObstacleCollision(game.ball)) {
          game.bounces++;
          spawnParticles(game.ball.x, game.ball.y, '#06b6d4', 4);
        }
        checkTargetCollision(game.ball);
      }

      // Particles
      for (let i = game.particles.length - 1; i >= 0; i--) {
        game.particles[i].update();
        if (game.particles[i].life <= 0) game.particles.splice(i, 1);
      }

      // Floaters
      for (let i = game.floaters.length - 1; i >= 0; i--) {
        game.floaters[i].update();
        if (game.floaters[i].life <= 0) game.floaters.splice(i, 1);
      }
    }

    function draw() {
      drawBackground();
      drawSpawnPoint();
      drawObstacles();
      drawTargets();
      drawAimGuide();
      drawBall();
      drawParticles();
      drawFloaters();
    }

    function loop() {
      update();
      draw();
      game.animId = requestAnimationFrame(loop);
    }

    // ===== Init =====
    // Ensure valid defaults before building menu
    if (!game.unlockedLevels || game.unlockedLevels < 1) game.unlockedLevels = 1;
    if (!game.levelStars || !Array.isArray(game.levelStars)) game.levelStars = [0, 0, 0];
    buildMenu();
    loop();

    // Save/Load progress
    try {
      const saved = localStorage.getItem('bounce_progress');
      if (saved) {
        const data = JSON.parse(saved);
        game.unlockedLevels = data.unlocked || 1;
        game.levelStars = data.stars || [0, 0, 0];
        buildMenu();
      }
    } catch (e) {}

    window.addEventListener('beforeunload', () => {
      try {
        localStorage.setItem('bounce_progress', JSON.stringify({
          unlocked: game.unlockedLevels,
          stars: game.levelStars
        }));
      } catch (e) {}
    });
  </script>
</body>
</html>
