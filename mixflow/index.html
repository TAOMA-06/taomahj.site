<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MixFlow — AI Cocktail Recipe Browser">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';">
  <title>MixFlow · Cocktail Browser</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🍸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Spotlight overlay -->
  <div class="spotlight"></div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">← taomahj</a>
      <span class="nav-brand">🍸 MixFlow</span>
      <div class="nav-links">
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">
          <span class="lang-zh">中</span>
          <span class="lang-divider">/</span>
          <span class="lang-en">EN</span>
        </button>
        <button class="nav-btn active" data-tab="cocktails" data-i18n="nav.cocktails">Cocktails</button>
        <button class="nav-btn" data-tab="mocktails" data-i18n="nav.mocktails">Mocktails</button>
        <button class="nav-btn" id="favBtn">★ <span data-i18n="nav.favorites">Favorites</span> <span id="favCount">0</span></button>
      </div>
    </div>
  </nav>

  <!-- Hero / Header -->
  <header class="page-header">
    <h1 class="page-title">MixFlow</h1>
    <p class="page-subtitle" data-i18n="hero.subtitle">AI 驱动的鸡尾酒配方浏览器</p>
    <div class="search-bar-wrapper">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="search.placeholder" placeholder="搜索鸡尾酒名称、配料、类别...">
      <select id="categoryFilter" class="category-select">
        <option value="all" data-i18n="category.all">全部类别</option>
      </select>
    </div>
    <div class="stats-bar">
      <span id="resultCount">0</span> <span data-i18n="stats.recipes">个配方</span>
    </div>
    <!-- Action Bar -->
    <div class="action-bar">
      <button class="action-btn" id="randomBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        <span data-i18n="action.random">随机推荐</span>
      </button>
      <button class="action-btn" id="sortBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
        <span data-i18n="action.sort">排序</span>
      </button>
      <button class="action-btn" id="shareBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        <span data-i18n="action.share">分享</span>
      </button>
    </div>
  </header>

  <!-- Cocktail Grid -->
  <main class="main-content">
    <div class="cocktail-grid" id="cocktailGrid">
      <!-- Cards rendered by JS -->
    </div>
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p data-i18n="loading">加载配方中...</p>
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <p data-i18n="empty">没有找到匹配的配方</p>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-content" id="modalContent">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- Random Pick Modal -->
  <div class="modal-overlay" id="randomOverlay">
    <div class="modal modal-random" id="randomModal">
      <button class="modal-close" id="randomClose">&times;</button>
      <div class="modal-content" id="randomContent">
        <div class="random-hero">
          <div class="random-shaker">🍸</div>
          <h2 class="random-title" data-i18n="random.title">命运的安排</h2>
          <p class="random-subtitle" data-i18n="random.subtitle">摇动手机或点击按钮，让命运为你调一杯</p>
        </div>
        <div class="random-result" id="randomResult" style="display:none">
          <!-- Filled by JS -->
        </div>
        <div class="random-actions">
          <button class="random-btn primary" id="shakeAgainBtn" data-i18n="random.shakeAgain">再摇一次</button>
          <button class="random-btn secondary" id="acceptFateBtn" data-i18n="random.accept">接受命运</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sort Dropdown -->
  <div class="sort-dropdown" id="sortDropdown" style="display:none">
    <button class="sort-option" data-sort="name-asc" data-i18n="sort.nameAsc">名称 A-Z</button>
    <button class="sort-option" data-sort="name-desc" data-i18n="sort.nameDesc">名称 Z-A</button>
    <button class="sort-option" data-sort="category" data-i18n="sort.category">按类别</button>
  </div>

  <!-- Back to top -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <!-- Mobile Quick Action FAB -->
  <button class="mobile-fab" id="mobileFab" aria-label="Quick actions">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 21h8"/><path d="M12 21v-7"/><path d="M12 14l7-7H5l7 7z"/>
    </svg>
  </button>

  <!-- Mobile FAB Menu -->
  <div class="mobile-fab-menu" id="mobileFabMenu">
    <button class="mobile-fab-item" id="fabRandom" data-i18n="action.random">随机推荐</button>
    <button class="mobile-fab-item" id="fabFav" data-i18n="nav.favorites">收藏</button>
    <button class="mobile-fab-item" id="fabShare" data-i18n="action.share">分享</button>
    <button class="mobile-fab-item" id="fabTop">回到顶部</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
