<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=(), autoplay=(), encrypted-media=(), fullscreen=(self), picture-in-picture=(), screen-wake-lock=(), sync-xhr=(), xr-spatial-tracking=()">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Strict-Transport-Security" content="max-age=63072000; includeSubDomains; preload">
  <meta name="description" content="壁纸图库 — taomahj 收藏的高清壁纸，原图下载无限制。">
  <title data-i18n="page.title">壁纸图库 — taomahj</title>
  <link rel="icon" href="../assets/favicon-gallery.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">taomahj<span class="accent">.</span>site</a>
      <div class="nav-links">
        <a href="../index.html" data-i18n="nav.back">← 返回</a>
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">
          <span class="lang-zh">中</span>
          <span class="lang-divider">/</span>
          <span class="lang-en">EN</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      <span data-i18n="hero.badge">高清壁纸</span>
    </div>
    <h1 data-i18n="hero.title">壁纸图库</h1>
    <h2 data-i18n="hero.subtitle">个人收藏 · 原图下载 · 不限制大小</h2>
    <p class="hero-sub" data-i18n="hero.desc">所有壁纸均为原图直出，无压缩、无水印。点击下载即可获取原始文件。</p>
  </section>

  <!-- Gallery -->
  <section class="gallery-section" id="gallery">
    <div class="gallery-header">
      <div class="gallery-count" id="galleryCount"></div>
    </div>
    <div class="gallery-grid" id="galleryGrid">
      <!-- Rendered by JS -->
    </div>
    <div class="gallery-empty" id="galleryEmpty" style="display:none;">
      <span>🖼️</span>
      <p data-i18n="empty">图库暂空。用 <code>scripts/add-wallpaper.py</code> 添加壁纸。</p>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
      <div class="lightbox-info" id="lightboxInfo"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="page-footer">
    <p>&copy; 2026 <a href="../index.html">taomahj</a> · <span data-i18n="footer">壁纸图库</span></p>
  </footer>

  <script src="../scripts/security.js"></script>
  <script src="app.js"></script>
</body>
</html>
